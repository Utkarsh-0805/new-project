  .page {

    display: flex;
    flex-direction: column;
    justify-content: flex-start;

  .ig-logo {

    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
  }

  .ig-logo svg { width: 62px; height: 62px; }

  .headline {
    font-size: clamp(34px, 4vw, 52px);
    line-height: 1.15;
    font-weight: 600;
    max-width: 620px;
    margin: 0 0 40px 0;
  }

  .headline .accent {
    background: linear-gradient(90deg, #fd8d32, #e13985, #b13ee0);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .phone-mockup {
    position: relative;
    width: 520px;
    max-width: 90vw;
    height: 420px;
  }

  .card {
    position: absolute;
    top: 20px;
    width: 240px;
    height: 380px;
    border-radius: 22px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    overflow: hidden;
  }

  .card.back-left {
    left: 30px;
    background: linear-gradient(160deg, #ff5fa2, #7b2ff7 60%, #1c1b2e);
    transform: rotate(-8deg);
    opacity: 0.9;
  }

  .card.back-right {
    left: 280px;
    background: linear-gradient(200deg, #7d3cf7, #2b1a45);
    transform: rotate(9deg);
    opacity: 0.9;
  }

  .card.front {
    left: 140px;
    top: 0;
    width: 260px;
    height: 420px;
    background: linear-gradient(160deg, #8fae4a 0%, #5c7a2e 50%, #3a3a1e 100%);
    z-index: 2;
  }

  .card .progress-bar {
    position: absolute;
    top: 12px;
    left: 12px;
    right: 12px;
    height: 3px;
    background: rgba(255,255,255,0.35);
    border-radius: 3px;
  }
  .card .progress-bar::after {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 55%;
    background: #fff;
    border-radius: 3px;
  }

  .reaction-bubble {
    position: absolute;
    top: 90px;

    background: #fff;
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 20px;
    box-shadow: 0 6px 16px rgba(0,0,0,0.4);
    z-index: 3;

  .heart-badge {

    height: 60px;
    border-radius: 50%;

  .field {

    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 8px;
    padding: 16px 40px 16px 14px;
    color: #fff;
    font-size: 16px;
    margin-bottom: 14px;
    outline: none;
  }

  .field::placeholder { color: var(--text-muted); }
  .field:focus { border-color: #6b6b6b; }

  .field-wrap { position: relative; }
  .field-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 18px;
    pointer-events: none;
  }

  .login-btn {
    width: 100%;
    background: var(--blue);
    opacity: 0.5;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 14px 0;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 22px;
    transition: opacity 0.15s ease;
  }
  .login-btn.active { opacity: 1; }
  .login-btn.active:hover { background: var(--blue-hover); }

  .forgot-link {
    text-align: center;
    margin-bottom: 24px;
  }
  .forgot-link a {
    color: #fff;
    font-size: 14px;
    text-decoration: none;
  }
  .forgot-link a:hover { text-decoration: underline; }

  .fb-login {
    width: 100%;
    background: transparent;
    border: 1px solid var(--input-border);
    border-radius: 8px;
    padding: 12px 0;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    margin-bottom: 16px;
  }
  .fb-login:hover { background: rgba(255,255,255,0.05); }

  .create-account {
    width: 100%;

    padding: 12px 0;
    color: var(--blue);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;

  }
  .create-account:hover { background: rgba(0,149,246,0.08); }

  .meta-logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--text-muted);
    font-size: 15px;
  }

  footer {
    text-align: center;
    padding: 20px 12px 30px;
    color: var(--text-muted);
    font-size: 13px;
  }
  footer .links {
    display: flex;

    justify-content: center;
    gap: 6px 16px;

  }
  footer .links a {
    color: var(--text-muted);
    text-decoration: none;
  }
  footer .links a:hover { text-decoration: underline; }

  @media (max-width: 860px) {
    .hero { display: none; }
  }
</style>
</head>
